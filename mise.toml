[vars]
SPENDING_RATIO = "0.80"
RETURN_RATE    = "0.07"
INFLATION      = "0.03"
TAX_RATE       = "0.22"
LIFE_EXP       = "100"
EARLY_AGE      = "55"

[tasks.retire]
description = "Baseline household projection"
run = """
bean-retire "$MAIN_BEANCOUNT_FILE" \
  --spending-ratio {{vars.SPENDING_RATIO}} \
  --return-rate    {{vars.RETURN_RATE}} \
  --inflation-rate {{vars.INFLATION}} \
  --life-expectancy {{vars.LIFE_EXP}} \
  --detail
"""

[tasks.retire-tax]
description = "Baseline with marginal tax drag on traditional/HSA withdrawals"
run = """
bean-retire "$MAIN_BEANCOUNT_FILE" \
  --spending-ratio {{vars.SPENDING_RATIO}} \
  --return-rate    {{vars.RETURN_RATE}} \
  --inflation-rate {{vars.INFLATION}} \
  --tax-rate       {{vars.TAX_RATE}} \
  --life-expectancy {{vars.LIFE_EXP}} \
  --detail
"""

[tasks.retire-conservative]
description = "Stress test: lower returns, higher inflation, Monte Carlo"
run = """
bean-retire "$MAIN_BEANCOUNT_FILE" \
  --spending-ratio 0.90 \
  --return-rate    0.05 \
  --inflation-rate 0.035 \
  --tax-rate       {{vars.TAX_RATE}} \
  --life-expectancy 105 \
  --return-stddev  0.15 \
  --monte-carlo \
  --simulation-count 2000 \
  --detail
"""

[tasks.retire-optimistic]
description = "Tailwind: higher returns, lower spending"
run = """
bean-retire "$MAIN_BEANCOUNT_FILE" \
  --spending-ratio 0.75 \
  --return-rate    0.08 \
  --inflation-rate 0.025 \
  --tax-rate       {{vars.TAX_RATE}} \
  --life-expectancy {{vars.LIFE_EXP}} \
  --detail
"""

[tasks.retire-early]
description = "What-if: retire at EARLY_AGE for all owners, with Monte Carlo"
run = """
bean-retire "$MAIN_BEANCOUNT_FILE" \
  --spending-ratio {{vars.SPENDING_RATIO}} \
  --return-rate    {{vars.RETURN_RATE}} \
  --inflation-rate {{vars.INFLATION}} \
  --tax-rate       {{vars.TAX_RATE}} \
  --life-expectancy {{vars.LIFE_EXP}} \
  --retirement-age-override {{vars.EARLY_AGE}} \
  --monte-carlo \
  --detail
"""

[tasks.retire-person1]
description = "Per-owner projection: person1 against full household spending"
run = """
bean-retire "$MAIN_BEANCOUNT_FILE" \
  --owner person1 \
  --spending-ratio {{vars.SPENDING_RATIO}} \
  --return-rate    {{vars.RETURN_RATE}} \
  --inflation-rate {{vars.INFLATION}} \
  --tax-rate       {{vars.TAX_RATE}} \
  --life-expectancy {{vars.LIFE_EXP}} \
  --detail
"""

[tasks.retire-person2]
description = "Per-owner projection: person2 against full household spending"
run = """
bean-retire "$MAIN_BEANCOUNT_FILE" \
  --owner person2 \
  --spending-ratio {{vars.SPENDING_RATIO}} \
  --return-rate    {{vars.RETURN_RATE}} \
  --inflation-rate {{vars.INFLATION}} \
  --tax-rate       {{vars.TAX_RATE}} \
  --life-expectancy {{vars.LIFE_EXP}} \
  --detail
"""
